<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ごとう</title>
    <style>
        /* 全体の基本設定 */
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            line-height: 1.6;
            margin: 0;
            color: #333;
            background-color: #f9f9f9;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
            text-align: center;
        }

        /* 「作成中」の点滅アニメーション設定 */
        .status-blink {
            color: red;
            font-weight: bold;
            margin-top: 20px;
            animation: blink 1.0s infinite; /* 1秒間隔で無限ループ */
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* ヘッダー・ナビゲーション */
        header {
            background: #fff;
            padding: 20px 0;
            border-bottom: 1px solid #ddd;
        }
        nav ul {
            list-style: none;
            padding: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        nav a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
        }

        /* メインビジュアル (Heroセクション) */
        .hero {
            padding: 60px 0;
            background: #fff;
        }
        .hero h2 {
            font-size: 2rem;
            color: #2c3e50;
        }
        .btn {
            display: inline-block;
            background: #2c3e50;
            color: #fff;
            padding: 10px 30px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
        }

        /* 各コンテンツセクション */
        .about {
            padding: 60px 0;
            background: #eee;
        }

        /* フッター */
        footer {
            padding: 20px 0;
            background: #333;
            color: #fff;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <!-- ステータス表示（作成中） -->
    <section class="status-section">
        <div class="container">
            <h1 class="status-blink">作成中</h1>
        </div>
    </section>

    <!-- ヘッダー -->
    <header>
        <div class="container">
            <h1>ごとう</h1>
            <nav>
                <ul>
                    <li><a href="#">ホーム</a></li>
                    <li><a href="#about">私たちについて</a></li>
                    <li><a href="#service">サービス</a></li>
                    <li><a href="#contact">お問い合わせ</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- メインビジュアル -->
    <section class="hero">
        <div class="container">
            <h2>あなたのビジネスを<br>誠心誠意、アシストします。</h2>
            <p>確かな技術とサポートで、未来の可能性を広げます。</p>
            <a href="#contact" class="btn">お問い合わせ</a>
        </div>
    </section>

    <!-- コンテンツ -->
    <section id="about" class="about">
        <div class="container">
            <h2>私たちについて</h2>
            <p>「アシスト」は、お客様の課題解決に寄り添い、共に成長を目指すパートナーです。</p>
        </div>
    </section>

    <!-- フッター -->
    <footer>
        <div class="container">
            <p>&copy; 2026 アシスト All Rights Reserved.</p>
        </div>
    </footer>

</body>
</html>
